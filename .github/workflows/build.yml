name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  XPACK_ARM_VERSION: "14.2.1-1.1"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: CH32V203
            build_dir: firmware/build-ch32
          - platform: K1921VK035
            build_dir: firmware/build-arm

    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4

      - name: Checkout dependencies
        uses: actions/checkout@v4
        with:
          repository: GooDroneru/dependencies
          path: _deps
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true
          fetch-depth: 0

      # CMakeLists.txt expects dependencies to be at ../dependencies relative to
      # the firmware repo (sibling directory). Create a symlink to match that layout.
      - name: Symlink dependencies to expected path
        run: ln -s "${GITHUB_WORKSPACE}/_deps" "${GITHUB_WORKSPACE}/../dependencies"

      # --------------- RISC-V toolchain (WCH-patched, from dependencies repo) ---------------
      - name: Setup RISC-V toolchain env
        if: matrix.platform == 'CH32V203'
        run: |
          TOOL_ROOT="${GITHUB_WORKSPACE}/_deps/tools/risc/riscv-toolchain/risc-none-embed-gcc-8.2.0"
          GCC_BIN="$TOOL_ROOT/bin/riscv-none-embed-gcc"
          if [ ! -f "$GCC_BIN" ]; then
            echo "riscv-none-embed-gcc not found at $GCC_BIN" >&2
            ls -la "$TOOL_ROOT/bin" || true
            exit 1
          fi
          chmod +x "$TOOL_ROOT/bin/"*
          echo "Found toolchain: $GCC_BIN"
          echo "RISCV_TOOLCHAIN_DIR=$TOOL_ROOT" >> $GITHUB_ENV
          echo "$TOOL_ROOT/bin" >> $GITHUB_PATH

      - name: Debug - RISC-V toolchain
        if: matrix.platform == 'CH32V203'
        run: |
          echo "RISCV_TOOLCHAIN_DIR=$RISCV_TOOLCHAIN_DIR"
          riscv-none-embed-gcc --version || true

      # --------------- ARM toolchain ---------------
      - name: Cache ARM toolchain
        id: cache-arm-toolchain
        if: matrix.platform == 'K1921VK035'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/_deps/tools/arm/xpack-arm-none-eabi-gcc-${{ env.XPACK_ARM_VERSION }}
          key: arm-toolchain-${{ env.XPACK_ARM_VERSION }}-linux-x64

      - name: Install ARM toolchain
        if: steps.cache-arm-toolchain.outputs.cache-hit != 'true' && matrix.platform == 'K1921VK035'
        run: bash "${GITHUB_WORKSPACE}/_deps/tools/arm/install-toolchain.sh"

      # --------------- Build ---------------
      - name: Configure CMake
        run: |
          if [ "${{ matrix.platform }}" = "CH32V203" ] && [ -n "${CC:-}" ]; then
            echo "Using CC from env: $CC"
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }} \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_CXX_COMPILER="$CXX" \
              -DCMAKE_ASM_COMPILER="$ASM"
          elif [ "${{ matrix.platform }}" = "CH32V203" ]; then
            GCC_BIN="$RISCV_TOOLCHAIN_DIR/bin/riscv-none-embed-gcc"
            GXX_BIN="$RISCV_TOOLCHAIN_DIR/bin/riscv-none-embed-g++"
            if [ ! -f "$GCC_BIN" ]; then
              echo "riscv-none-embed-gcc not found in $RISCV_TOOLCHAIN_DIR/bin"
              ls -la "$RISCV_TOOLCHAIN_DIR/bin" || true
              exit 1
            fi
            echo "Using compiler: $GCC_BIN"
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }} \
              -DCMAKE_C_COMPILER="$GCC_BIN" \
              -DCMAKE_CXX_COMPILER="$GXX_BIN"
          else
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }}
          fi

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.platform }}-${{ github.sha }}
          path: |
            ${{ matrix.build_dir }}/*.hex
            ${{ matrix.build_dir }}/*.bin
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts (CH32V203)
        uses: actions/download-artifact@v4
        with:
          name: firmware-CH32V203-${{ github.sha }}
          path: artifacts/ch32

      - name: Download firmware artifacts (K1921VK035)
        uses: actions/download-artifact@v4
        with:
          name: firmware-K1921VK035-${{ github.sha }}
          path: artifacts/arm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*