name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  XPACK_ARM_VERSION: "14.2.1-1.1"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: CH32V203
            build_dir: firmware/build-ch32
          - platform: K1921VK035
            build_dir: firmware/build-arm

    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4

      - name: Checkout dependencies
        uses: actions/checkout@v4
        with:
          repository: GooDroneru/dependencies
          path: _deps
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true
          fetch-depth: 0

      # CMakeLists.txt expects dependencies to be at ../dependencies relative to
      # the firmware repo (sibling directory). Create a symlink to match that layout.
      - name: Symlink dependencies to expected path
        run: ln -s "${GITHUB_WORKSPACE}/_deps" "${GITHUB_WORKSPACE}/../dependencies"

      # --------------- RISC-V toolchain ---------------
      - name: Cache RISC-V toolchain
        id: cache-riscv-toolchain
        if: matrix.platform == 'CH32V203'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/riscv
          key: riscv-toolchain-embed-v1.4-linux-x64

      - name: Setup Node.js (for xpm)
        if: matrix.platform == 'CH32V203'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Ensure xpm CLI (install if missing)
        if: matrix.platform == 'CH32V203'
        run: |
          if command -v xpm >/dev/null 2>&1; then
            echo "xpm already available"
            xpm --version
            exit 0
          fi
          echo "xpm not found; attempting to install via npm..."
          if ! command -v npm >/dev/null 2>&1; then
            echo "npm not available on runner; cannot install xpm" >&2
            exit 1
          fi
          npm install --global @xpack-dev-tools/xpm || npm install --global xpm || true
          if ! command -v xpm >/dev/null 2>&1; then
            echo "Failed to install xpm via npm; please ensure the runner has xpm preinstalled" >&2
            exit 1
          fi
          xpm --version

      - name: Install RISC-V toolchain via xpm
        if: matrix.platform == 'CH32V203' && steps.cache-riscv-toolchain.outputs.cache-hit != 'true'
        run: |
          if ! command -v xpm >/dev/null 2>&1; then
            echo "xpm not found; failing as required." >&2
            exit 1
          fi

          echo "Installing xPack riscv toolchain via xpm"
          PKG="@xpack-dev-tools/riscv-none-embed-gcc@8.2.1-3.1.1"
          echo "Installing xpm package: $PKG"
          if ! xpm install --global "$PKG"; then
            echo "xpm failed to install package $PKG" >&2
            exit 3
          fi
          echo "xpm installed package: $PKG"

          GCC_BIN=$(find "$HOME/.local/xPacks/@xpack-dev-tools/riscv-none-embed-gcc" \
            -path "*/bin/riscv-none-embed-gcc" -type f 2>/dev/null | head -n1)
          if [ -z "$GCC_BIN" ]; then
            echo "Failed to locate riscv-none-embed-gcc binary" >&2
            find "$HOME/.local/xPacks/@xpack-dev-tools/riscv-none-embed-gcc" -maxdepth 5 2>/dev/null || true
            exit 1
          fi
          TOOL_BIN=$(dirname "$GCC_BIN")
          TOOL_ROOT=$(dirname "$TOOL_BIN")
          echo "Found xpack toolchain: $GCC_BIN"
          echo "RISCV_TOOLCHAIN_DIR=$TOOL_ROOT" >> $GITHUB_ENV
          echo "$TOOL_BIN" >> $GITHUB_PATH

      - name: Debug - RISC-V toolchain
        if: matrix.platform == 'CH32V203'
        run: |
          echo "RISCV_TOOLCHAIN_DIR=$RISCV_TOOLCHAIN_DIR"
          ls -la "$RISCV_TOOLCHAIN_DIR/bin" || echo "bin directory not found"
          which riscv-none-embed-gcc || echo "riscv-none-embed-gcc not on PATH"
          riscv-none-embed-gcc --version || true

      # --------------- ARM toolchain ---------------
      - name: Cache ARM toolchain
        id: cache-arm-toolchain
        if: matrix.platform == 'K1921VK035'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/_deps/tools/arm/xpack-arm-none-eabi-gcc-${{ env.XPACK_ARM_VERSION }}
          key: arm-toolchain-${{ env.XPACK_ARM_VERSION }}-linux-x64

      - name: Install ARM toolchain
        if: steps.cache-arm-toolchain.outputs.cache-hit != 'true' && matrix.platform == 'K1921VK035'
        run: bash "${GITHUB_WORKSPACE}/_deps/tools/arm/install-toolchain.sh"

      # --------------- Build ---------------
      - name: Configure CMake
        run: |
          if [ "${{ matrix.platform }}" = "CH32V203" ] && [ -n "${CC:-}" ]; then
            echo "Using CC from env: $CC"
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }} \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_CXX_COMPILER="$CXX" \
              -DCMAKE_ASM_COMPILER="$ASM"
          elif [ "${{ matrix.platform }}" = "CH32V203" ]; then
            BIN_DIR="$RISCV_TOOLCHAIN_DIR/bin"
            FIRST_GCC=$(ls "$BIN_DIR"/*-gcc 2>/dev/null | head -n1 || true)
            if [ -z "$FIRST_GCC" ]; then
              echo "No suitable riscv compiler found in $RISCV_TOOLCHAIN_DIR/bin"
              ls -la "$RISCV_TOOLCHAIN_DIR/bin" || true
              exit 1
            fi
            CXX_BIN="${FIRST_GCC%-gcc}-g++"
            echo "Using compiler: $FIRST_GCC"
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }} \
              -DCMAKE_C_COMPILER="$FIRST_GCC" \
              -DCMAKE_CXX_COMPILER="$CXX_BIN"
          else
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }}
          fi

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.platform }}-${{ github.sha }}
          path: |
            ${{ matrix.build_dir }}/*.hex
            ${{ matrix.build_dir }}/*.bin
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts (CH32V203)
        uses: actions/download-artifact@v4
        with:
          name: firmware-CH32V203-${{ github.sha }}
          path: artifacts/ch32

      - name: Download firmware artifacts (K1921VK035)
        uses: actions/download-artifact@v4
        with:
          name: firmware-K1921VK035-${{ github.sha }}
          path: artifacts/arm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*