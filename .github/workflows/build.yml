name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  XPACK_ARM_VERSION: "14.2.1-1.1"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: CH32V203
            build_dir: firmware/build-ch32
          - platform: K1921VK035
            build_dir: firmware/build-arm

    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4

      - name: Checkout dependencies
        uses: actions/checkout@v4
        with:
          repository: GooDroneru/dependencies
          path: _deps
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true
          fetch-depth: 0

      # CMakeLists.txt expects dependencies to be at ../dependencies relative to
      # the firmware repo (sibling directory). Create a symlink to match that layout.
      - name: Symlink dependencies to expected path
        run: ln -s "${GITHUB_WORKSPACE}/_deps" "${GITHUB_WORKSPACE}/../dependencies"

      # --------------- RISC-V toolchain (hydrausb3, WCH-Interrupt-fast support) ---------------
      - name: Cache RISC-V toolchain
        id: cache-riscv-toolchain
        if: matrix.platform == 'CH32V203'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/riscv
          key: riscv-toolchain-hydrausb3-12.2.0-1-linux-x64

      - name: Install RISC-V toolchain (hydrausb3)
        if: matrix.platform == 'CH32V203' && steps.cache-riscv-toolchain.outputs.cache-hit != 'true'
        run: |
          ARCHIVE="xpack-riscv-none-elf-gcc-12.2.0-1-linux-x64.tar.gz"
          URL="https://github.com/hydrausb3/riscv-none-elf-gcc-xpack/releases/download/12.2.0-1/${ARCHIVE}"
          DEST="${{ runner.temp }}/riscv"

          echo "Downloading $URL"
          mkdir -p "$DEST"
          curl -fSL "$URL" -o "/tmp/${ARCHIVE}"

          echo "Extracting to $DEST"
          tar -xf "/tmp/${ARCHIVE}" -C "$DEST" --strip-components=1
          rm "/tmp/${ARCHIVE}"

          echo "Toolchain installed to $DEST"

      - name: Setup RISC-V toolchain env
        if: matrix.platform == 'CH32V203'
        run: |
          TOOL_ROOT="${{ runner.temp }}/riscv"
          GCC_BIN=$(find "$TOOL_ROOT/bin" -name "riscv-none-elf-gcc" -type f 2>/dev/null | head -n1)
          if [ -z "$GCC_BIN" ]; then
            echo "Failed to locate riscv-none-elf-gcc binary" >&2
            ls -la "$TOOL_ROOT/bin" || true
            exit 1
          fi
          echo "Found toolchain: $GCC_BIN"
          echo "RISCV_TOOLCHAIN_DIR=$TOOL_ROOT" >> $GITHUB_ENV
          echo "$TOOL_ROOT/bin" >> $GITHUB_PATH

      - name: Debug - RISC-V toolchain
        if: matrix.platform == 'CH32V203'
        run: |
          echo "RISCV_TOOLCHAIN_DIR=$RISCV_TOOLCHAIN_DIR"
          ls -la "$RISCV_TOOLCHAIN_DIR/bin" | grep gcc || echo "gcc not found in bin"
          which riscv-none-elf-gcc || echo "riscv-none-elf-gcc not on PATH"
          riscv-none-elf-gcc --version || true

      # --------------- ARM toolchain ---------------
      - name: Cache ARM toolchain
        id: cache-arm-toolchain
        if: matrix.platform == 'K1921VK035'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/_deps/tools/arm/xpack-arm-none-eabi-gcc-${{ env.XPACK_ARM_VERSION }}
          key: arm-toolchain-${{ env.XPACK_ARM_VERSION }}-linux-x64

      - name: Install ARM toolchain
        if: steps.cache-arm-toolchain.outputs.cache-hit != 'true' && matrix.platform == 'K1921VK035'
        run: bash "${GITHUB_WORKSPACE}/_deps/tools/arm/install-toolchain.sh"

      # --------------- Build ---------------
      - name: Configure CMake
        run: |
          if [ "${{ matrix.platform }}" = "CH32V203" ] && [ -n "${CC:-}" ]; then
            echo "Using CC from env: $CC"
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }} \
              -DCMAKE_C_COMPILER="$CC" \
              -DCMAKE_CXX_COMPILER="$CXX" \
              -DCMAKE_ASM_COMPILER="$ASM"
          elif [ "${{ matrix.platform }}" = "CH32V203" ]; then
            BIN_DIR="$RISCV_TOOLCHAIN_DIR/bin"
            # hydrausb3 toolchain uses riscv-none-elf-gcc
            GCC_BIN="$BIN_DIR/riscv-none-elf-gcc"
            GXX_BIN="$BIN_DIR/riscv-none-elf-g++"
            if [ ! -f "$GCC_BIN" ]; then
              echo "riscv-none-elf-gcc not found in $BIN_DIR"
              ls -la "$BIN_DIR" || true
              exit 1
            fi
            echo "Using compiler: $GCC_BIN"
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }} \
              -DCMAKE_C_COMPILER="$GCC_BIN" \
              -DCMAKE_CXX_COMPILER="$GXX_BIN"
          else
            cmake -S firmware -B ${{ matrix.build_dir }} \
              -DCMAKE_BUILD_TYPE=Release \
              -DMCU_PLATFORM=${{ matrix.platform }}
          fi

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel $(nproc)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.platform }}-${{ github.sha }}
          path: |
            ${{ matrix.build_dir }}/*.hex
            ${{ matrix.build_dir }}/*.bin
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download firmware artifacts (CH32V203)
        uses: actions/download-artifact@v4
        with:
          name: firmware-CH32V203-${{ github.sha }}
          path: artifacts/ch32

      - name: Download firmware artifacts (K1921VK035)
        uses: actions/download-artifact@v4
        with:
          name: firmware-K1921VK035-${{ github.sha }}
          path: artifacts/arm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*